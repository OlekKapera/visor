name: PyPI Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      target:
        description: "Where to publish the package"
        required: true
        default: "testpypi"
        type: choice
        options:
          - testpypi
          - pypi
      ref:
        description: "Git ref to publish (tag, branch, or SHA). Defaults to current ref."
        required: false
        type: string

concurrency:
  group: pypi-release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build-and-verify:
    runs-on: ubuntu-latest
    outputs:
      package_version: ${{ steps.meta.outputs.package_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . build twine

      - name: Run unit tests
        run: python -m unittest discover -s tests -p "test_*.py"

      - name: Read package version
        id: meta
        run: |
          python - <<'PY'
          import tomllib
          from pathlib import Path

          data = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))
          version = data["project"]["version"]
          print(f"package_version={version}")
          with Path(__import__("os").environ["GITHUB_OUTPUT"]).open("a", encoding="utf-8") as f:
              f.write(f"package_version={version}\n")
          PY

      - name: Ensure tag matches project version
        if: github.event_name == 'push'
        env:
          TAG: ${{ github.ref_name }}
          PACKAGE_VERSION: ${{ steps.meta.outputs.package_version }}
        run: |
          EXPECTED_TAG="v${PACKAGE_VERSION}"
          if [ "${TAG}" != "${EXPECTED_TAG}" ]; then
            echo "Tag/version mismatch: tag=${TAG}, expected=${EXPECTED_TAG}"
            exit 1
          fi

      - name: Build distributions
        run: python -m build

      - name: Validate distributions
        run: python -m twine check dist/*

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/*
          if-no-files-found: error

  publish-testpypi:
    name: Publish to TestPyPI
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'testpypi'
    needs: build-and-verify
    runs-on: ubuntu-latest
    environment:
      name: testpypi
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist

      - name: Publish package distributions to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: dist

  publish-pypi:
    name: Publish to PyPI
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'pypi')
    needs: build-and-verify
    runs-on: ubuntu-latest
    environment:
      name: pypi
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
